apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-blue
  namespace: shop-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
      version: blue
  template:
    metadata:
      labels:
        app: order-service
        version: blue
    spec:
      containers:
        - name: order-service
          image: order-service:1.0
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: app-config