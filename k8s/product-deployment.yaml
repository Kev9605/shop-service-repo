apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: shop-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: product-service:1.0
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: app-config